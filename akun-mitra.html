<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://fasih-sm.bps.go.id https://*.bps.go.id;">
  <title>Akun Mitra - BPS Automation v5.1.0</title>
  <link href="main.css" rel="stylesheet"/>
  <style>
    /* Minimal topbar for standalone page */
    .standalone-topbar {
      height: 60px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .standalone-topbar .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .standalone-topbar .page-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .standalone-topbar .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .standalone-topbar .topbar-btn {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border-color);
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .standalone-topbar .topbar-btn:hover {
      background: var(--gray-200);
      color: var(--primary);
      border-color: var(--primary);
    }

    .back-link {
      text-decoration: none;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: var(--transition);
    }

    .back-link:hover {
      background: var(--gray-200);
      color: var(--primary);
    }

    /* Main content wrapper */
    .standalone-content {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .standalone-topbar {
        padding: 0 16px;
        height: 50px;
      }

      .standalone-topbar .page-title {
        font-size: 1rem;
      }

      .standalone-content {
        padding: 16px;
      }

      .back-link span {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .standalone-topbar {
        padding: 0 12px;
      }

      .standalone-content {
        padding: 12px;
      }
    }

    /* Override page-akun-mitra styles for standalone use */
    .akun-mitra-page {
      display: block;
      padding: 0;
    }

    .akun-mitra-page > .card {
      flex: none;
      min-height: auto;
    }

    .akun-mitra-page .card-body {
      overflow: visible;
    }

    .akun-mitra-page .table-wrapper {
      max-height: 60vh;
    }
  </style>
</head>
<body>

<!-- Topbar -->
<header class="standalone-topbar">
  <div class="topbar-left">
    <a href="dashboard.html" class="back-link">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      <span>Kembali ke Dashboard</span>
    </a>
    <h1 class="page-title">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Akun Mitra
    </h1>
  </div>
  <div class="topbar-right">
    <button id="themeToggle" class="topbar-btn" title="Toggle Theme">
      <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- Main Content -->
<main class="standalone-content">
  <div class="akun-mitra-page">
    <div class="card">
      <div class="card-header">
        <h2>Akun Mitra</h2>
        <div class="header-actions">
          <button id="loadAkunMitraBtn" class="btn btn-primary btn-sm">Load Data</button>
          <button id="downloadAkunCsvBtn" class="btn btn-success btn-sm" disabled>CSV</button>
          <button id="downloadAkunExcelBtn" class="btn btn-info btn-sm" disabled>Excel</button>
        </div>
      </div>
      <div class="card-body">
        <div class="filter-row">
          <div class="form-group search-group">
            <label for="akunSearchInput">🔍 Pencarian Live:</label>
            <input type="text" id="akunSearchInput" class="form-input" placeholder="Ketik untuk mencari username, nama, email, NIK..."/>
          </div>
        </div>
        <div id="akunLoading" style="display:none; text-align:center; padding:20px;">
          <div style="font-size:1.5rem; margin-bottom:8px;">⏳</div>
          <p style="color:var(--text-secondary);">Memuat semua data akun mitra...</p>
          <p style="font-size:0.8rem; color:var(--text-secondary);" id="akunLoadingStatus">Mohon tunggu</p>
        </div>
        <div class="table-wrapper">
          <table class="preview-table" id="akunMitraTable">
            <thead>
              <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Nama Lengkap</th>
                <th>NIK</th>
                <th>Status</th>
                <th>Tanggal Daftar</th>
              </tr>
            </thead>
            <tbody id="akunMitraTableBody">
              <tr><td colspan="6" class="text-center text-muted">Klik "Load Data" untuk memuat daftar akun mitra</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination-wrapper" id="akunMitraPagination">
          <button id="prevPageBtn" class="btn btn-secondary btn-sm" disabled>Previous</button>
          <span id="pageInfo" class="page-info">Page 1</span>
          <button id="nextPageBtn" class="btn btn-secondary btn-sm" disabled>Next</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="app-footer" style="margin-left:0;">
  <p>© 2026 BPS Automation — Made with ❤️ by BPS Kabupaten Kutai Kartanegara</p>
</footer>

<!-- Local XLSX Library -->
<script src="xlsx.full.min.js"></script>
<!-- Akun Mitra Script -->
<script type="module" src="src/modules/akun-mitra.js"></script>
</body>
</html>
